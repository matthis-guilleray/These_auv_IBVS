/bluerov2/joy_linux_node:
  ros__parameters:
    dev: /dev/input/js0
    deadzone: 0.2
    autorepeat_rate: 0.0
/bluerov2/teleop_twist_joy_node:
  ros__parameters:
    require_enable_button: false
    axis_linear.x: 1
    axis_linear.y: 0
    axis_linear.z: 4
    axis_angular.yaw: 3
    axis_angular.roll: 7
    axis_angular.pitch: 6
    scale_linear.x: 0.2
    scale_linear.y: 0.2
    scale_linear.z: 0.4
    scale_angular.yaw: 0.2
    scale_angular.roll: 0.2
    scale_angular.pitch: 0.2